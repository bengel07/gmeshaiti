
{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>✏️ Éditer la succursale : {{ succursale.nom }}</h2>

    <form method="POST" action="{{ url_for('edit_succursale', succ_id=succursale.id) }}">
        <!-- CODE -->
        <div class="form-group">
            <label>Code</label>
            <input type="text"
                   name="code"
                   value="{{ succursale.code }}"
                   class="form-control"
                   readonly>
        </div>

        <!-- NOM -->
        <div class="form-group">
            <label>Nom de la succursale</label>
            <input type="text"
                   name="nom"
                   value="{{ succursale.nom }}"
                   class="form-control"
                   required>
        </div>

        <!-- VILLE -->
        <div class="form-group">
            <label>Ville</label>
            <input type="text"
                   name="ville"
                   value="{{ succursale.ville }}"
                   class="form-control">
        </div>

        <!-- ADRESSE -->
        <div class="form-group">
            <label>Adresse</label>
            <input type="text"
                   name="adresse"
                   value="{{ succursale.adresse }}"
                   class="form-control">
        </div>

        <!-- TELEPHONE -->
        <div class="form-group">
            <label>Téléphone</label>
            <input type="text"
                   name="telephone"
                   value="{{ succursale.telephone }}"
                   class="form-control">
        </div>

        <!-- EMAIL -->
        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   name="email"
                   value="{{ succursale.email }}"
                   class="form-control">
        </div>

        <!-- STATUT -->
        <div class="form-group">
            <label>Statut</label>
            <select name="statut" class="form-control">
                <option value="active" {% if succursale.statut == 'active' %}selected{% endif %}>Active</option>
                <option value="inactive" {% if succursale.statut == 'inactive' %}selected{% endif %}>Inactive</option>
                <option value="maintenance" {% if succursale.statut == 'maintenance' %}selected{% endif %}>Maintenance</option>
            </select>
        </div>

        <!-- ACTIONS -->
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">
                💾 Enregistrer
            </button>

            <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                ↩️ Annuler
            </a>

            {% if succursale.directeur_id %}
            <a href="{{ url_for('edit_admin', admin_id=succursale.directeur_id) }}"
               class="btn btn-warning">
                👤 Gérer l’admin
            </a>
            {% else %}
            <a href="{{ url_for('ajouter_admin', succursale_id=succursale.id) }}"
               class="btn btn-success">
                ➕ Ajouter un admin
            </a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
