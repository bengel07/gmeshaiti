<!-- Sidebar simplifié et fonctionnel -->
<nav id="sidebar" class="collapse show bg-light p-3" style="width:250px;">
    <div class="position-sticky pt-3">
        <div class="sidebar-header p-3 border-bottom">
            <h5 class="text-center">Administration GMES</h5>
            <p class="small text-muted text-center mb-0">
                {{ current_user.username }}
            </p>
        </div>


        <ul class="nav flex-column mt-3">
            <!-- Tableau de bord -->
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'admin_dashboard' %}active{% endif %}"
                   href="{{ url_for('admin_dashboard') }}">
                    📊 Tableau de bord
                </a>
            </li>

            <!-- Succursales -->
            <li class="nav-item">
                <a class="nav-link {% if request.endpoint == 'create_succursale' %}active{% endif %}"
                   href="{{ url_for('create_succursale') }}">
                    🏢 Nouvelle succursale
                </a>
            </li>

            <!-- Administrateurs -->
            <li class="nav-item">
                <a class="nav-link"
                   href="{{ url_for('ajouter_admin') if 'ajouter_admin' in g.routes else '#' }}"
                   onclick="return checkEndpoint('ajouter_admin', this)">
                    👑 Nouvel admin
                </a>
            </li>

            <!-- Agents -->
            <li class="nav-item">
                <a class="nav-link"
                   href="{{ url_for('create_agent') if 'create_agent' in g.routes else '#' }}"
                   onclick="return checkEndpoint('create_agent', this)">
                    👤 Nouvel agent
                </a>
            </li>

            <hr class="my-2">

            <!-- Clients -->
            <li class="nav-item">
                <a class="nav-link" href="#">
                    👥 Clients
                </a>
            </li>

            <!-- Prêts -->
            <li class="nav-item">
                <a class="nav-link" href="#">
                    💰 Prêts
                </a>
            </li>

            <!-- Rapports -->
            <li class="nav-item">
                <a class="nav-link" href="#">
                    📈 Rapports
                </a>
            </li>

            {% if current_user.role == "super_admin" %}
            <hr class="my-2">

            <li class="nav-item">
                <a class="nav-link text-danger" href="{{ url_for('liste_users') }}">
                    ⚙ Gestion des utilisateurs
                </a>
            </li>
            {% endif %}


            <!-- Déconnexion -->
            <li class="nav-item">
                <a class="nav-link text-danger" href="{{ url_for('deconnexion') }}">
                    🚪 Déconnexion
                </a>
            </li>
        </ul>
    </div>
</nav>

<style>
.sidebar {
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    overflow-y: auto;
    box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}

.sidebar .nav-link {
    padding: 0.75rem 1rem;
    color: #333;
    border-radius: 0.25rem;
    margin: 0.1rem 0.5rem;
}

.sidebar .nav-link:hover {
    background-color: #e9ecef;
}

.sidebar .nav-link.active {
    background-color: #0d6efd;
    color: white;
}

.sidebar-header {
    background-color: #f8f9fa;
}
</style>

<script>
// Fonction pour vérifier si une route existe
function checkEndpoint(endpointName, linkElement) {
    // Si le href est '#', la route n'existe pas
    if (linkElement.getAttribute('href') === '#') {
        alert('La route "' + endpointName + '" n\'est pas encore disponible.');
        return false;
    }
    return true;
}

// Vérifier les routes disponibles au chargement
document.addEventListener('DOMContentLoaded', function() {
    console.log('Sidebar chargé');
});
</script>
