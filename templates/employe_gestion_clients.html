<!-- templates/employe_gestion_clients.html -->
{% extends "base.html" %}

{% block title %}Gestion des Clients - Employé{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Gestion des Clients</h1>
    </div>

    <div class="row">
        <div class="col-lg-12">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">Liste des Clients</h6>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-bordered" id="dataTable" width="100%" cellspacing="0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nom</th>
                                    <th>Prénom</th>
                                    <th>Email</th>
                                    <th>Téléphone</th>
                                    <th>Date d'inscription</th>
                                    <th>Statut</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- This will be populated dynamically -->
                                <tr>
                                    <td colspan="8" class="text-center">
                                        <div class="spinner-border" role="status">
                                            <span class="sr-only">Chargement...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$(document).ready(function() {
    $('#dataTable').DataTable({
        "language": {
            "url": "//cdn.datatables.net/plug-ins/1.10.25/i18n/French.json"
        },
        "ajax": {
            "url": "{{ url_for('api_clients_list') }}",
            "dataSrc": ""
        },
        "columns": [
            { "data": "id" },
            { "data": "nom" },
            { "data": "prenom" },
            { "data": "email" },
            { "data": "telephone" },
            { "data": "date_inscription" },
            {
                "data": "statut",
                "render": function(data) {
                    var badge = data === 'actif' ? 'success' :
                               data === 'en_attente' ? 'warning' : 'danger';
                    return '<span class="badge badge-' + badge + '">' + data + '</span>';
                }
            },
            {
                "data": "id",
                "render": function(data) {
                    return '<a href="/client/' + data + '" class="btn btn-sm btn-primary">Voir</a>' +
                           '<a href="/client/' + data + '/edit" class="btn btn-sm btn-info ml-1">Modifier</a>';
                }
            }
        ]
    });
});
</script>
{% endblock %}
