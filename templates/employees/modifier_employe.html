{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card bg-warning text-white">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h3><i class="fas fa-edit me-2"></i> Modifier l'employé</h3>
                        <p class="mb-0">Employé: <strong>{{ employe.prenom }} {{ employe.nom }}</strong></p>
                    </div>
                    <a href="{{ url_for('voir_employe', employe_id=employe.id) }}" class="btn btn-light">
                        <i class="fas fa-arrow-left me-1"></i> Retour
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Prénom</label>
                        <input type="text" name="prenom" class="form-control" value="{{ employe.prenom }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Nom</label>
                        <input type="text" name="nom" class="form-control" value="{{ employe.nom }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" value="{{ employe.email }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Téléphone</label>
                        <input type="text" name="telephone" class="form-control" value="{{ employe.telephone }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Adresse</label>
                        <input type="text" name="adresse" class="form-control" value="{{ employe.adresse }}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Rôle</label>
                        <select name="role" class="form-control">
                            <option value="employe" {% if employe.role == 'employe' %}selected{% endif %}>Employé</option>
                            <option value="superviseur" {% if employe.role == 'superviseur' %}selected{% endif %}>Superviseur</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Fonction</label>
                        <input type="text" name="fonction" class="form-control" value="{{ employe.fonction }}">
                    </div>
                </div>
                <div class="text-end">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i> Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
